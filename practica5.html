    <!DOCTYPE html>
<!-- Indica que el documento está escrito en HTML5 -->

<html lang="en">
<!-- Etiqueta principal que contiene toda la página
     lang="en" indica que el idioma es inglés -->

<head>
    <!-- Contiene información del documento (no visible en la página) -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres (permite usar tildes y ñ) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea adaptable a celulares y tablets -->

    <title>Document</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
    <!-- Contiene todo lo visible de la página -->

    <ul>
        <!-- Lista desordenada (unordered list)
             Se usa para mostrar elementos con viñetas -->

        <li>Elemento 1</li>
        <!-- Elemento de la lista -->

        <li>Elemento 2</li>
        <!-- Otro elemento de la lista -->

        <li>Elemento 3</li>
        <!-- Otro elemento de la lista -->

    </ul>

</body>

</html>
