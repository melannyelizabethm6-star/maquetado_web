<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Titulo principal o de primer orden</h1>
    <h2>Titulo de segundo orden</h2>
    <h3>Titulo de tercer orden</h3>
    <h4>Titulo de cuarto orden</h4>
    <h5>Titulo de quinto orden</h5>
    <h6>Titulo de sexto orden</h6>

<a href="practica8.html">volver </a>
</body>
</html>
<!--📌 Estructura básica de un documento HTML

HTML (HyperText Markup Language) es el lenguaje que se usa para crear páginas web.
Se basa en etiquetas que le indican al navegador cómo mostrar el contenido.

🔹 <!DOCTYPE html>

Es una declaración que indica que el documento está en HTML5.
Permite que el navegador interprete correctamente la página.

🔹 <html lang="en">

Es la etiqueta raíz (la principal).
Encierra todo el contenido de la página.

lang="en" indica que el idioma es inglés.
👉 Si el contenido está en español, se recomienda usar lang="es".
🔹 <head>

Contiene información no visible para el usuario, pero importante para el navegador.

Incluye:

configuración
metadatos
título
🔹 <meta charset="UTF-8">

Define la codificación de caracteres.
Permite mostrar correctamente letras como:

ñ
tildes (á, é, í)
🔹 <meta name="viewport"...>

Hace que la página sea adaptable a diferentes dispositivos (responsive).

🔹 <title>

Define el nombre que aparece en la pestaña del navegador.

🔹 <body>

Contiene todo el contenido visible:

textos
imágenes
títulos
botones, etc.
📌 Etiquetas de títulos (<h1> a <h6>)

Estas etiquetas se usan para definir encabezados o títulos en la página.

Van desde el más importante al menos importante:

🔸 <h1>

Es el título principal de la página.
👉 Solo debe haber uno por página (recomendado).

🔸 <h2>

Subtítulo del <h1>
Se usa para dividir secciones importantes.

🔸 <h3>

Subdivisión del <h2>

🔸 <h4>

Subnivel del <h3>

🔸 <h5>

Nivel más específico

🔸 <h6>

El nivel más bajo de título

📊 Jerarquía de títulos

Se organizan como una estructura:

h1
 ├── h2
 │    ├── h3
 │    │    ├── h4
 │    │    │    ├── h5
 │    │    │    │    └── h6

👉 Esto ayuda a:

organizar la información
mejorar el SEO
facilitar la lectura
⚠️ Importante (teoría clave)
No uses los <h1> - <h6> solo para hacer texto grande
Se usan para estructura y jerarquía
El tamaño visual se puede cambiar con CSS  -->
