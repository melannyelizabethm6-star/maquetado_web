<!DOCTYPE html>

<!-- ¿Qué es? Es una declaración (no una etiqueta HTML como tal).
¿Para qué sirve? Le indica al navegador que el documento está escrito en HTML5. Así el navegador interpreta el código correctamente y no usa modos de compatibilidad con versiones antiguas.
Siempre va al principio del archivo. -->

<html lang="en">

<!-- <html lang="en">
Todo lo que escribas irá dentro de esta caja gigante.
lang="en" significa "idioma inglés", pero puedes cambiarlo a lang="es" para español.
Es como poner una etiqueta que dice: "Este documento está en español". -->

<head>

 <!--<head>
Aquí pones información secreta que el usuario NO ve, pero que el navegador o Google sí ven. Cosas como:
El título de la pestaña
El idioma
La descripción para buscadores  -->

    <meta charset="UTF-8">

    <!-- <meta charset="UTF-8">
Esta línea permite que puedas usar letras con tildes (á, é, í, ó, ú), la ñ y emoji 😊.
Sin esto, verías cosas raras como "Ã±" en lugar de "ñ". -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0">
Hace que tu página se vea bien en celulares y tablets.
width=device-width → la página usa el ancho de tu pantalla
initial-scale=1.0 → no empiece haciendo zoom ni encogido -->

    <title>Document</title>

    <!-- <title>Document</title>
Esto es el nombre que ves en la pestaña del navegador.
Ejemplo: si pones <title>Mi primera página</title>, en la pestaña aparecerá "Mi primera página". -->
</head>
<body>
    
 <!-- <body>
Aquí va todo lo que SÍ ve el usuario: texto, fotos, botones, videos, etc.
Es como el "escenario" donde ocurre el espectáculo. -->

</body>
</html>

<!-- </html> y </body>
Son las etiquetas de cierre. Piensa que abriste una caja con <html> y la cierras con </html>.
Todo lo que esté dentro es parte de la página. -->
