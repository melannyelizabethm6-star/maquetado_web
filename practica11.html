<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tablas</title>
</head>
<body>
  <!-- La etiqueta table se utiliza para definir tablas en HTML. Todo el contenido de la tabla, incluidas las filas y celdas, se coloca dentro de esta etiqueta -->

<!-- La etiqueta tr se utiliza para definir una fila en una tabla. Cada fila puede contener una o más celdas, que se definen utilizando las etiquetas td (para celdas de datos) o th (para celdas de encabezado) -->

<!-- La etiqueta td define una celda de datos dentro de una fila. Cada etiqueta td representa una columna en la tabla -->

<!-- La etiqueta th define una celda de encabezado dentro de una fila. Cada etiqueta th representa un encabezado de columna en la tabla -->

<table border="1">
  <tr>
  <th> Encabezado 1</th>
  <th>Encabezado 2</th>
  <th>Encabezado 3</th>
</tr>

 <tr>
  <th> Dato 1</th>
  <th>Dato 2</th>
  <th>Dato 3</th>
</tr>

<tr>
  <th> Dato 4</th>
  <th>Dato 5</th>
  <th>Dato 6</th>
</tr>
</table>
<br>

<Table border="1">
  <caption>Paises y capitales</caption>
<tr>
  <th>pais</th>
  <th>Capital</th>
</tr>
<tr>
  <td>españa</td>
  <td>Madrid</td>
</tr>
<tr>
  <td>Francia</td>
  <td>Paris</td>
</tr>
<tr>
  <td>Italia</td>
  <td>Roma</td>
</tr>
</Table>

<br>

<table border="1">
<tr>
  <th colspan="4">Mundial de futbol</th>
</tr>
<tr>
  <td rowspan="3">Paises con mayoria de goles</td>
  <td>brasil </td> <td>230</td>
</tr>
<tr>
  <td>Alemania</td><td>180</td>
</tr>
<tr>
  <td>argentina</td> <td>150</td>
</tr>
</table>

</body>
</html>
